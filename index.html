<title>AirSpace Live</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --bg:#040806;
    --panel:#06120c;
    --green:#5ef2a0;
    --green-dim:#2f7d54;
    --green-faint:#1c4632;
    --green-glow:rgba(94,242,160,.55);
    --amber:#e8a33d;
    --txt:#cdeedb;
    --txt-dim:#5c8a72;
    --line:#143226;
    --mono:'SF Mono',ui-monospace,'Cascadia Code','JetBrains Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:var(--mono);overscroll-behavior:none}
  body{padding:env(safe-area-inset-top) 20px env(safe-area-inset-bottom);max-width:520px;margin:0 auto}

  /* Header */
  .eyebrow{color:var(--txt-dim);letter-spacing:.32em;font-size:13px;
    text-transform:uppercase;margin:26px 0 8px}
  h1{font-family:-apple-system,system-ui,sans-serif;font-weight:700;
    font-size:34px;line-height:1.05;margin:0 0 18px;color:var(--green);
    letter-spacing:-.01em}
  h1 .count{color:var(--green)}

  /* Radar */
  .radar-wrap{position:relative;width:100%;aspect-ratio:1/1;margin:6px 0 4px}
  #radar{width:100%;height:100%;display:block;touch-action:none}

  .infobox{position:absolute;background:rgba(4,14,9,.92);
    border:1px solid var(--green-dim);border-radius:8px;padding:11px 14px;
    font-size:13px;line-height:1.5;pointer-events:none;
    box-shadow:0 0 22px rgba(0,0,0,.6);min-width:178px;backdrop-filter:blur(3px);
    opacity:0;transition:opacity .15s;z-index:5}
  .infobox.show{opacity:1}
  .infobox .cs{color:var(--green);font-weight:600;font-size:15px;letter-spacing:.04em}
  .infobox .rt{color:var(--txt);margin-top:3px}
  .infobox .mt{color:var(--txt-dim)}
  .infobox .hint{color:var(--green-dim);font-size:10px;letter-spacing:.14em;
    margin-top:5px;text-transform:uppercase}

  /* Status line */
  .statusline{display:flex;justify-content:space-between;align-items:center;
    color:var(--green-dim);font-size:13px;letter-spacing:.08em;
    padding:8px 2px 16px;border-bottom:1px solid var(--line)}

  /* Search + scan */
  .searchrow{display:flex;gap:12px;margin:20px 0 12px}
  .searchrow input{flex:1;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;color:var(--txt);font-family:var(--mono);font-size:17px;
    padding:16px 18px;letter-spacing:.04em;outline:none}
  .searchrow input:focus{border-color:var(--green-dim)}
  .searchrow input::placeholder{color:var(--txt-dim)}
  .scanbtn{background:var(--panel);border:1px solid var(--green-dim);
    border-radius:12px;color:var(--green);font-family:var(--mono);font-size:15px;
    letter-spacing:.16em;padding:0 26px;cursor:pointer;font-weight:600}
  .scanbtn:active{background:var(--green-faint)}

  /* Mode switch (Feeder <-> GPS) */
  .modeswitch{display:flex;gap:0;margin:4px 0 8px;border:1px solid var(--line);
    border-radius:11px;overflow:hidden;background:var(--panel)}
  .modeswitch button{flex:1;background:transparent;border:none;color:var(--txt-dim);
    font-family:var(--mono);font-size:13px;letter-spacing:.14em;padding:13px 0;
    cursor:pointer;text-transform:uppercase;transition:.15s}
  .modeswitch button.active{background:var(--green-faint);color:var(--green)}

  /* Range buttons */
  .rangerow{display:flex;align-items:center;gap:10px;margin:22px 0 6px;flex-wrap:wrap}
  .rangerow .lbl{color:var(--txt-dim);font-size:13px;letter-spacing:.16em;
    flex:1 0 100%;margin-bottom:2px}
  .rangerow button{flex:1;min-width:48px;background:var(--panel);
    border:1px solid var(--line);border-radius:10px;color:var(--txt-dim);
    font-family:var(--mono);font-size:15px;padding:13px 0;cursor:pointer}
  .rangerow button.active{border-color:var(--green-dim);color:var(--green)}

  /* Toggle rows */
  .toggles{margin-top:14px}
  .toggle{display:flex;justify-content:space-between;align-items:center;
    padding:18px 2px;border-top:1px solid var(--line);letter-spacing:.16em;
    font-size:15px;color:var(--txt);text-transform:uppercase}
  .sw{width:50px;height:28px;border-radius:16px;background:var(--green-faint);
    position:relative;cursor:pointer;transition:.2s;flex:none}
  .sw::after{content:"";position:absolute;width:22px;height:22px;border-radius:50%;
    background:var(--txt-dim);top:3px;left:3px;transition:.2s}
  .sw.on{background:var(--green-dim)}
  .sw.on::after{left:25px;background:var(--green);box-shadow:0 0 10px var(--green-glow)}

  /* Detail sheet */
  .sheet{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;
    background:var(--panel);border-top-left-radius:20px;border-top-right-radius:20px;
    border:1px solid var(--line);transform:translateY(110%);transition:transform .32s cubic-bezier(.4,0,.2,1);
    z-index:20;max-height:88vh;overflow-y:auto;padding:0 20px 30px}
  .sheet.open{transform:translateY(0)}
  .grip{width:40px;height:4px;border-radius:2px;background:var(--green-faint);
    margin:12px auto 18px}
  .sheet .lab{color:var(--txt-dim);letter-spacing:.22em;font-size:12px;
    text-transform:uppercase;margin:6px 0}
  .sheet .photo{width:100%;border-radius:12px;border:1px solid var(--line);
    margin:10px 0;display:block}

  /* Satellite Feed */
  .satwrap{position:relative;width:100%;height:240px;border-radius:12px;
    overflow:hidden;border:1px solid var(--line);margin:10px 0}
  .satmap{position:absolute;inset:0;background:#0a1410}
  .satmap .leaflet-control-attribution{font-size:8px;background:rgba(4,8,6,.6);color:#5c8a72}
  .satmap .leaflet-control-zoom{display:none}
  .sat-inset{position:absolute;top:10px;right:10px;width:42%;max-width:170px;
    border-radius:7px;overflow:hidden;border:1px solid var(--green-dim);
    box-shadow:0 4px 14px rgba(0,0,0,.5);z-index:500}
  .sat-inset img{width:100%;display:block}
  .sat-coords{position:absolute;bottom:8px;right:10px;z-index:500;
    font-size:12px;color:var(--green);letter-spacing:.06em;
    text-shadow:0 1px 3px rgba(0,0,0,.9);text-align:right}
  .plane-marker{filter:drop-shadow(0 0 4px rgba(94,242,160,.8))}
  .sheet .cs-big{font-family:-apple-system,system-ui,sans-serif;font-weight:700;
    font-size:30px;color:var(--green);margin:14px 0 2px}
  .sheet .sub{color:var(--txt-dim);font-size:14px;letter-spacing:.06em}
  .route{display:flex;justify-content:space-between;align-items:center;
    border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-top:18px}
  .route .ap{font-family:-apple-system,system-ui,sans-serif;font-weight:700;
    font-size:26px;color:var(--green)}
  .route .apname{color:var(--txt-dim);font-size:12px;margin-top:2px}
  .route .arrow{color:var(--green-dim);font-size:18px}

  .empty{color:var(--txt-dim);text-align:center;padding:30px;letter-spacing:.1em;font-size:14px}
  .closebtn{position:absolute;top:14px;right:18px;color:var(--txt-dim);
    font-size:24px;cursor:pointer;line-height:1}
</style>
</head>
<body>
  <div class="eyebrow">AirSpace Live</div>
  <h1><span class="count" id="count">—</span> <span id="countword">aircraft in range.</span></h1>

  <div class="radar-wrap">
    <canvas id="radar"></canvas>
    <div class="infobox" id="infobox"></div>
  </div>

  <div class="statusline">
    <span id="rangeLbl">RANGE 25 NM</span>
    <span id="contactsLbl">0 CONTACTS</span>
    <span id="clockLbl">--:--:--</span>
  </div>

  <div class="modeswitch" id="modeswitch">
    <button data-mode="gps" class="active">📍 GPS</button>
    <button data-mode="feeder">📡 Feeder</button>
  </div>

  <div class="searchrow">
    <input id="search" placeholder="CALLSIGN SUCHEN" autocomplete="off" spellcheck="false">
    <button class="scanbtn" id="scanbtn">SCAN</button>
  </div>

  <div class="rangerow">
    <span class="lbl">RANGE (NM)</span>
    <button data-r="5">5</button>
    <button data-r="10">10</button>
    <button data-r="25" class="active">25</button>
    <button data-r="50">50</button>
    <button data-r="100">100</button>
  </div>

  <div class="toggles">
    <div class="toggle">MILITARY HIGHLIGHT <div class="sw" id="swMil"></div></div>
    <div class="toggle">ALL LABELS <div class="sw" id="swLabels"></div></div>
  </div>

  <!-- Detail sheet -->
  <div class="sheet" id="sheet">
    <span class="closebtn" id="sheetClose">✕</span>
    <div class="grip"></div>
    <div class="lab" id="satLab" style="display:none">Satellite Feed</div>
    <div class="satwrap" id="satwrap" style="display:none">
      <div class="satmap" id="satmap"></div>
      <div class="sat-inset" id="satInset" style="display:none"><img id="satInsetImg" alt=""></div>
      <div class="sat-coords" id="satCoords"></div>
    </div>
    <div id="sheetBody"></div>
  </div>

<script>
/* ============ Konfiguration ============ */
const BASE = "https://web-production-a6fc8.up.railway.app";
const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem("asl_"+k);return v===null?d:JSON.parse(v)}catch(e){return d}},
  set:(k,v)=>{try{localStorage.setItem("asl_"+k,JSON.stringify(v))}catch(e){}}
};

let state = {
  mode:   LS.get("mode","gps"),       // "gps" | "feeder"
  radius: LS.get("radius",25),
  token:  LS.get("token",""),         // Owner-Token (für Feeder-Modus)
  mil:    LS.get("mil",false),
  labels: LS.get("labels",false),
  center: null,                       // {lat,lon}
  aircraft: [],
  selected: null,
  query: ""
};

const $ = id => document.getElementById(id);
const toRad = d => d*Math.PI/180;

/* ============ Geometrie ============ */
function haversineNm(lat1,lon1,lat2,lon2){
  const R=3440.065;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearingDeg(lat1,lon1,lat2,lon2){
  const y=Math.sin(toRad(lon2-lon1))*Math.cos(toRad(lat2));
  const x=Math.cos(toRad(lat1))*Math.sin(toRad(lat2))
        - Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(toRad(lon2-lon1));
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

/* ============ Radar-Rendering ============ */
const canvas = $("radar");
const ctx = canvas.getContext("2d");
let cssSize=0, sweepAngle=0, dotHits=[];

function sizeCanvas(){
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  cssSize=rect.width;
  canvas.width=rect.width*dpr;
  canvas.height=rect.height*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function drawRadar(){
  const S=cssSize, c=S/2, R=S*0.46;
  ctx.clearRect(0,0,S,S);
  dotHits=[];

  // Ringe
  ctx.strokeStyle="rgba(94,242,160,.16)";
  ctx.lineWidth=1;
  for(let i=1;i<=5;i++){
    ctx.beginPath();ctx.arc(c,c,R*i/5,0,Math.PI*2);ctx.stroke();
  }
  // Achsen
  ctx.beginPath();ctx.moveTo(c-R,c);ctx.lineTo(c+R,c);
  ctx.moveTo(c,c-R);ctx.lineTo(c,c+R);ctx.stroke();

  // Ring-Beschriftung (nm)
  ctx.fillStyle="rgba(94,242,160,.5)";
  ctx.font="11px var(--mono)";ctx.textAlign="center";
  for(let i=1;i<=5;i++){
    const nm=Math.round(state.radius*i/5);
    ctx.fillText(nm, c+6, c-R*i/5+4);
  }

  // Himmelsrichtungen
  ctx.fillStyle="#cdeedb";ctx.font="bold 14px var(--mono)";
  ctx.fillText("N",c,c-R-8);
  ctx.fillText("S",c,c+R+18);
  ctx.textAlign="left";ctx.fillText("E",c+R+6,c+5);
  ctx.textAlign="right";ctx.fillText("W",c-R-6,c+5);
  ctx.textAlign="center";

  // Nordpfeil (amber)
  ctx.fillStyle="#e8a33d";
  ctx.beginPath();
  ctx.moveTo(c,c-R-2);ctx.lineTo(c-5,c-R+9);ctx.lineTo(c+5,c-R+9);ctx.closePath();ctx.fill();

  // Sweep
  const grad=ctx.createConicGradient(sweepAngle-0.5,c,c);
  grad.addColorStop(0,"rgba(94,242,160,0)");
  grad.addColorStop(0.12,"rgba(94,242,160,.28)");
  grad.addColorStop(0.13,"rgba(94,242,160,0)");
  ctx.save();
  ctx.beginPath();ctx.arc(c,c,R,0,Math.PI*2);ctx.clip();
  ctx.fillStyle=grad;ctx.fillRect(0,0,S,S);
  ctx.restore();
  ctx.strokeStyle="rgba(94,242,160,.7)";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(c,c);
  ctx.lineTo(c+Math.cos(sweepAngle)*R, c+Math.sin(sweepAngle)*R);ctx.stroke();

  // Zentrum
  ctx.fillStyle="#5ef2a0";ctx.beginPath();ctx.arc(c,c,3.5,0,Math.PI*2);ctx.fill();

  // Flugzeuge
  if(state.center){
    for(const a of state.aircraft){
      if(a.lat==null||a.lon==null) continue;
      const dist=haversineNm(state.center.lat,state.center.lon,a.lat,a.lon);
      if(dist>state.radius) continue;
      let brg=bearingDeg(state.center.lat,state.center.lon,a.lat,a.lon);
      const rr=R*dist/state.radius;
      const ang=toRad(brg-90);
      const x=c+Math.cos(ang)*rr, y=c+Math.sin(ang)*rr;
      const isMil=state.mil && a.mil;
      const isSel=state.selected && a.hex===state.selected.hex;

      // Geschwindigkeitsvektor
      if(a.track!=null && a.gs){
        const vlen=Math.min(a.gs/12,26);
        const ta=toRad(a.track-90);
        ctx.strokeStyle=isMil?"#e8a33d":"rgba(94,242,160,.55)";
        ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(x,y);
        ctx.lineTo(x+Math.cos(ta)*vlen,y+Math.sin(ta)*vlen);ctx.stroke();
      }
      // Punkt
      ctx.fillStyle=isMil?"#e8a33d":"#5ef2a0";
      ctx.beginPath();ctx.arc(x,y,isSel?5:3.4,0,Math.PI*2);ctx.fill();
      if(isSel){
        ctx.strokeStyle="#5ef2a0";ctx.lineWidth=1.2;
        ctx.strokeRect(x-9,y-9,18,18);
      }
      if(state.labels || isSel){
        ctx.fillStyle="rgba(205,238,219,.85)";ctx.font="10px var(--mono)";
        ctx.textAlign="left";
        ctx.fillText(a.flight||a.hex||"", x+8, y+3);
        ctx.textAlign="center";
      }
      dotHits.push({x,y,a,dist,brg});
    }
  }
}

function animate(){
  sweepAngle += 0.025;
  if(sweepAngle>Math.PI*2) sweepAngle-=Math.PI*2;
  drawRadar();
  requestAnimationFrame(animate);
}

/* ============ Datenabruf ============ */
async function fetchData(){
  try{
    if(state.mode==="feeder"){
      if(!state.token){ promptToken(); return; }
      const r=await fetch(`${BASE}/feeder?token=${encodeURIComponent(state.token)}`,{cache:"no-store"});
      if(r.status===403){ alert("Token ungültig oder kein Owner-Token."); switchMode("gps"); return; }
      const j=await r.json();
      if(!j.ok) throw new Error("feeder");
      state.center={lat:j.lat,lon:j.lon};
      // Feeder liefert rohe airplanes.live-Felder im Array "aircraft"
      state.aircraft=(j.aircraft||[]).map(normalizeRaw);
    } else {
      if(!state.center){ return; } // wartet auf GPS-Fix
      const {lat,lon}=state.center;
      const r=await fetch(`${BASE}/aircraft?lat=${lat}&lon=${lon}&radius=${state.radius}`,{cache:"no-store"});
      const j=await r.json();
      state.aircraft=(j.ac||[]).map(normalizeRaw);
    }
    updateCounts();
    if(state.selected) refreshSelected();
  }catch(e){
    console.warn("fetchData:",e.message);
  }
}

// airplanes.live-Rohformat -> einheitliches Objekt (dst NIE übernehmen, immer selbst rechnen)
function normalizeRaw(a){
  return {
    hex:a.hex, flight:(a.flight||"").trim(),
    lat:a.lat, lon:a.lon,
    alt:(a.alt_baro!=null?a.alt_baro:a.alt_geom),
    gs:a.gs, track:a.track,
    type:a.t, reg:a.r,
    mil:!!(a.dbFlags&1)
  };
}

function applyQueryFilter(list){
  if(!state.query) return list;
  const q=state.query.toUpperCase();
  return list.filter(a=>(a.flight||"").toUpperCase().includes(q)||(a.hex||"").toUpperCase().includes(q));
}

function inRange(){
  if(!state.center) return [];
  return applyQueryFilter(state.aircraft).filter(a=>{
    if(a.lat==null||a.lon==null) return false;
    return haversineNm(state.center.lat,state.center.lon,a.lat,a.lon)<=state.radius;
  });
}

function updateCounts(){
  const n=inRange().length;
  $("count").textContent=n;
  $("countword").textContent = n===1 ? "aircraft in range." : "aircraft in range.";
  $("contactsLbl").textContent = n+" CONTACTS";
  $("rangeLbl").textContent = "RANGE "+state.radius+" NM";
}

/* ============ GPS ============ */
let gpsWatch=null;
function startGps(){
  if(!navigator.geolocation){ alert("GPS nicht verfügbar."); return; }
  if(gpsWatch!==null) return;
  gpsWatch=navigator.geolocation.watchPosition(
    p=>{ state.center={lat:p.coords.latitude,lon:p.coords.longitude}; fetchData(); },
    e=>{ console.warn("GPS:",e.message); },
    {enableHighAccuracy:true,maximumAge:15000,timeout:27000}
  );
}
function stopGps(){
  if(gpsWatch!==null){ navigator.geolocation.clearWatch(gpsWatch); gpsWatch=null; }
}

/* ============ Modus-Umschaltung ============ */
function switchMode(mode){
  state.mode=mode; LS.set("mode",mode);
  document.querySelectorAll("#modeswitch button").forEach(b=>
    b.classList.toggle("active", b.dataset.mode===mode));
  state.center=null; state.aircraft=[]; updateCounts();
  if(mode==="gps"){ startGps(); }
  else { stopGps(); fetchData(); }
}

function promptToken(){
  const t=prompt("Owner-Token für Feeder-Modus eingeben:", state.token||"");
  if(t && t.trim()){ state.token=t.trim(); LS.set("token",state.token); fetchData(); }
  else { switchMode("gps"); }
}

/* ============ Satellite Feed (Leaflet + Esri) ============ */
let satMap=null, satMarker=null;
const planeIcon = () => L.divIcon({
  className:'plane-marker',
  html:'<svg width="30" height="30" viewBox="0 0 24 24" fill="#5ef2a0" xmlns="http://www.w3.org/2000/svg"><path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0011.5 2 1.5 1.5 0 0010 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg>',
  iconSize:[30,30], iconAnchor:[15,15]
});

function initSatMap(){
  if(satMap) return;
  satMap = L.map('satmap',{
    zoomControl:false, attributionControl:true,
    dragging:true, scrollWheelZoom:false, doubleClickZoom:true
  }).setView([0,0],12);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{
    maxZoom:18, attribution:'Esri World Imagery'
  }).addTo(satMap);
}

function updateSatMap(a){
  const wrap=$("satwrap"), lab=$("satLab");
  if(a.lat==null||a.lon==null){ wrap.style.display="none"; lab.style.display="none"; return; }
  wrap.style.display="block"; lab.style.display="block";
  initSatMap();
  // Leaflet muss nach dem Einblenden seine Größe neu berechnen
  setTimeout(()=>satMap.invalidateSize(),60);
  const ll=[a.lat,a.lon];
  if(!satMarker){ satMarker=L.marker(ll,{icon:planeIcon(),rotationAngle:a.track||0}).addTo(satMap); }
  else { satMarker.setLatLng(ll); }
  // beim Öffnen zentrieren; Nutzer kann danach frei verschieben
  if(!a._satCentered){ satMap.setView(ll,12); a._satCentered=true; }
  $("satCoords").innerHTML=`${a.lat.toFixed(2)}° ${a.lat>=0?'N':'S'} &nbsp; ${a.lon.toFixed(2)}° ${a.lon>=0?'E':'W'}`;
}

function setSatInset(src){
  const inset=$("satInset");
  if(src){ $("satInsetImg").src=src; inset.style.display="block"; }
  else { inset.style.display="none"; }
}

function resetSatMap(){
  if(satMarker){ satMap.removeLayer(satMarker); satMarker=null; }
  setSatInset(null);
  $("satwrap").style.display="none"; $("satLab").style.display="none";
}

/* ============ Detail-Sheet ============ */
async function openSheet(a,dist,brg){
  a._satCentered=false;
  state.selected=a;
  $("sheet").classList.add("open");
  updateSatMap(a);
  renderSheet(a,dist,brg);
  const cs=(a.flight||"").trim();
  if(cs){
    try{
      const r=await fetch(`${BASE}/route?callsign=${encodeURIComponent(cs)}`,{cache:"no-store"});
      const j=await r.json();
      a._route=j; renderSheet(a,dist,brg);
    }catch(e){}
  }
  if(a.reg){ loadPhoto(a); }
}

async function loadPhoto(a){
  try{
    const r=await fetch(`https://api.planespotters.net/pub/photos/reg/${encodeURIComponent(a.reg)}`,{cache:"force-cache"});
    const j=await r.json();
    const ph=j.photos&&j.photos[0];
    if(ph){ a._photo=ph.thumbnail_large?.src||ph.thumbnail?.src; a._photoCredit=ph.photographer; setSatInset(a._photo); renderSheet(a); }
  }catch(e){}
}

function refreshSelected(){
  const sel=state.aircraft.find(x=>x.hex===state.selected.hex);
  if(sel){
    sel._route=state.selected._route; sel._photo=state.selected._photo; sel._photoCredit=state.selected._photoCredit;
    sel._satCentered=state.selected._satCentered;
    state.selected=sel;
    if($("sheet").classList.contains("open")){
      const d=state.center?haversineNm(state.center.lat,state.center.lon,sel.lat,sel.lon):0;
      const b=state.center?bearingDeg(state.center.lat,state.center.lon,sel.lat,sel.lon):0;
      updateSatMap(sel);
      renderSheet(sel,d,b);
    }
  }
}

function renderSheet(a,dist,brg){
  const route=a._route||{};
  const from=route.from||route.origin||{};
  const to=route.to||route.destination||{};
  const airline=route.airline||a._airline||"";
  let html="";
  html+=`<div class="cs-big">${a.flight||a.hex||"—"}</div>`;
  html+=`<div class="sub">${[a.type||"", a.reg||""].filter(Boolean).join(" · ")}${airline?" · "+airline:""}</div>`;
  // Telemetrie
  html+=`<div style="display:flex;gap:24px;margin-top:16px;flex-wrap:wrap">
    <div><div class="lab">ALT</div><div style="font-size:20px;color:var(--green)">${a.alt!=null?Number(a.alt).toLocaleString():"—"} <span style="font-size:12px;color:var(--txt-dim)">FT</span></div></div>
    <div><div class="lab">SPEED</div><div style="font-size:20px;color:var(--green)">${a.gs!=null?Math.round(a.gs):"—"} <span style="font-size:12px;color:var(--txt-dim)">KT</span></div></div>
    <div><div class="lab">DIST</div><div style="font-size:20px;color:var(--green)">${dist!=null?dist.toFixed(1):"—"} <span style="font-size:12px;color:var(--txt-dim)">NM</span></div></div>
    <div><div class="lab">BRG</div><div style="font-size:20px;color:var(--green)">${brg!=null?Math.round(brg):"—"}<span style="font-size:12px;color:var(--txt-dim)">°</span></div></div>
  </div>`;
  // Route
  const fromCode=route.from_iata||from.iata||from.icao||"";
  const toCode=route.to_iata||to.iata||to.icao||"";
  if(fromCode||toCode){
    html+=`<div class="route">
      <div><div class="ap">${fromCode||"???"}</div><div class="apname">${from.name||from.municipality||""}</div></div>
      <div class="arrow">✈</div>
      <div style="text-align:right"><div class="ap">${toCode||"???"}</div><div class="apname">${to.name||to.municipality||""}</div></div>
    </div>`;
  }
  $("sheetBody").innerHTML=html;
}

/* ============ Tap auf Radar ============ */
canvas.addEventListener("click",ev=>{
  const rect=canvas.getBoundingClientRect();
  const x=ev.clientX-rect.left, y=ev.clientY-rect.top;
  let best=null,bd=1e9;
  for(const h of dotHits){
    const d=Math.hypot(h.x-x,h.y-y);
    if(d<18 && d<bd){ bd=d; best=h; }
  }
  if(best){ openSheet(best.a,best.dist,best.brg); showInfobox(best); }
  else { hideInfobox(); }
});

function showInfobox(h){
  const box=$("infobox");
  const a=h.a;
  box.innerHTML=`<div class="cs">✈ ${a.flight||a.hex||"—"}</div>
    <div class="rt">${(a._route&&(a._route.from_iata||a._route.to_iata))?`${a._route.from_iata||"?"} → ${a._route.to_iata||"?"}`:""}</div>
    <div class="mt">${a.gs!=null?Math.round(a.gs)+" KT":""}${a.alt!=null?"   "+Number(a.alt).toLocaleString()+" FT":""}</div>
    <div class="hint">Tap › Detail</div>`;
  const wrap=canvas.parentElement.getBoundingClientRect();
  let bx=h.x+14, by=h.y+14;
  if(bx>wrap.width-190) bx=h.x-190;
  if(by>wrap.height-90) by=h.y-90;
  box.style.left=Math.max(4,bx)+"px";
  box.style.top=Math.max(4,by)+"px";
  box.classList.add("show");
}
function hideInfobox(){ $("infobox").classList.remove("show"); }

/* ============ UI-Verdrahtung ============ */
document.querySelectorAll("#modeswitch button").forEach(b=>
  b.onclick=()=>switchMode(b.dataset.mode));

document.querySelectorAll(".rangerow button").forEach(b=>
  b.onclick=()=>{
    state.radius=+b.dataset.r; LS.set("radius",state.radius);
    document.querySelectorAll(".rangerow button").forEach(x=>x.classList.toggle("active",x===b));
    updateCounts(); fetchData();
  });

$("scanbtn").onclick=()=>{ state.query=$("search").value.trim(); updateCounts(); };
$("search").addEventListener("input",e=>{ state.query=e.target.value.trim(); updateCounts(); });
$("search").addEventListener("keydown",e=>{ if(e.key==="Enter"){ state.query=e.target.value.trim(); updateCounts(); }});

$("sheetClose").onclick=()=>{ $("sheet").classList.remove("open"); state.selected=null; hideInfobox(); resetSatMap(); };

function bindToggle(id,key){
  const el=$(id);
  el.classList.toggle("on",state[key]);
  el.onclick=()=>{ state[key]=!state[key]; LS.set(key,state[key]); el.classList.toggle("on",state[key]); };
}
bindToggle("swMil","mil");
bindToggle("swLabels","labels");

// Range-Button initial markieren
document.querySelectorAll(".rangerow button").forEach(b=>
  b.classList.toggle("active",+b.dataset.r===state.radius));

/* ============ Uhr ============ */
function tickClock(){
  const d=new Date();
  $("clockLbl").textContent=d.toTimeString().slice(0,8);
}
setInterval(tickClock,1000); tickClock();


/* ---- Service Worker (Offline-Shell, via Blob registriert) ---- */
if('serviceWorker' in navigator){
  const swCode = `
    const C='airspace-v1';
    self.addEventListener('install',e=>{self.skipWaiting()});
    self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim())});
    self.addEventListener('fetch',e=>{
      if(e.request.method!=='GET') return;
      e.respondWith(
        fetch(e.request).then(r=>{
          const cp=r.clone();
          caches.open(C).then(c=>c.put(e.request,cp)).catch(()=>{});
          return r;
        }).catch(()=>caches.match(e.request))
      );
    });
  `;
  try{
    const blob=new Blob([swCode],{type:'text/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }catch(e){}
}

/* ============ Start ============ */
function resize(){ sizeCanvas(); }
window.addEventListener("resize",resize);
sizeCanvas();
animate();
switchMode(state.mode);        // initialer Modus (GPS default)
setInterval(fetchData, 5000);  // Refresh-Intervall
</script>
</body>
</html>
